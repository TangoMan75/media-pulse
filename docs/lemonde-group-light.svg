<svg width="480" height="270" viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <style>
      .subtitle { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; font-size: 11px; }
      .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; font-size: 12px; }
      .value { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 20px; font-weight: 600; }
      .source { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; font-size: 11px; }
      .header { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; font-size: 14px; }
    </style>
  </defs>
  <rect x="0" y="0" width="480" height="270" fill="url(#bgGradient)" rx="16"/>
  <g transform="translate(20, 20)"><image href="data:image/svg+xml;base64," width="217" height="50"/></g>
  <g transform="translate(20, 100)"><text x="0" y="0" class="header" font-size="14">Sur l'ensemble des titres du groupe</text></g>
  <g transform="translate(20, 120)">
    <g>
      <rect width="210" height="70" rx="12" fill="url(#cardGradient)" stroke="#e2e8f0"/>
      <text x="15" y="30" class="value">175 millions</text>
      <text x="15" y="50" class="label">de visiteurs mensuels</text>
    </g>
    <g transform="translate(230, 0)">
      <rect width="210" height="70" rx="12" fill="url(#cardGradient)" stroke="#e2e8f0"/>
      <text x="15" y="30" class="value">448 millions</text>
      <text x="15" y="50" class="label">de pages vues par mois</text>
    </g>
  </g>
  <g transform="translate(0, 200)">
    <text x="240" y="30" class="source" text-anchor="middle">Source ACPM: classement des sites et applications d'information générale.</text>
    <text x="240" y="44" class="source" text-anchor="middle">Moyenne des 12 derniers mois. Dernière mise à jour: mai 2026</text>
  </g>
</svg>